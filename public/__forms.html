<!DOCTYPE html>
<!--
  Static form stubs so Netlify's build-time form detection registers these forms.
  The live forms are rendered by React (components/ContactView.tsx, components/EnrollView.tsx)
  and submit here via fetch. Field names must stay in sync with those components.
-->
<html>
  <head><title>Netlify form detection</title></head>
  <body>
    <form name="contact" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <select name="inquiryType">
        <option value="Program Enrollment"></option>
        <option value="Partnership"></option>
        <option value="General Inquiry"></option>
      </select>
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form name="enroll" data-netlify="true" netlify-honeypot="bot-field" hidden>
      <input type="text" name="firstName" />
      <input type="text" name="lastName" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <input type="text" name="course" />
      <input type="text" name="startDate" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
